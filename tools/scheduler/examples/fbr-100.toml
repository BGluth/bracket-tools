# French Bread Rumble 100 — example scheduler config.
#
#   cargo run -p bracket-tools-scheduler --bin scheduler -- --config tools/scheduler/examples/fbr-100.toml
#
# SAFE BY DEFAULT: advisor_only pins the session to read-only regardless of
# token permissions — flip it (or pass no --advisor-only) on Friday once the
# setup counts below match the venue. Counts are per setup *type*: smash
# events share the switch pool and may borrow the pokemon stations; the
# pokemon event stays on its own hardware. Adjust counts live in the TUI
# ('s' adds/retires stations) or at launch with --setups.

tournament_slug = "tournament/french-bread-rumble-100"
advisor_only = true

poll_interval_secs = 30
no_show_secs = 300
rest_window_secs = 300

# Crash-recovery state (S4): the local overlay and the last-good snapshot.
# Defaults land beside the working directory; point them somewhere durable
# for the event. The single-instance lockfile lives beside the state file.
state_file = "fbr-100-state.json"
snapshot_file = "fbr-100-snapshot.json"

# Live-observed state ints (session 14 write probe).
known_called_state_int = 6
known_in_progress_state_int = 2

# Same-human links across events, by player id: uncomment and fill from the
# preflight identity-split report.
# player_aliases = [["1234567", "7654321"]]

# Stations per setup type. Optional — omit the table and the previous
# session's roster (or --setups) takes over.
[setups]
switch = 6
pokemon = 2

[[brackets]]
slug = "tournament/french-bread-rumble-100/event/ultimate-singles"
expected_kind = "elimination"
setup_type = ["switch", "pokemon"]

[[brackets]]
slug = "tournament/french-bread-rumble-100/event/melee-singles"
expected_kind = "elimination"
duration_prior_secs = 600
setup_type = ["switch", "pokemon"]

[[brackets]]
slug = "tournament/french-bread-rumble-100/event/brawl-singles"
expected_kind = "elimination"
setup_type = ["switch", "pokemon"]

[[brackets]]
slug = "tournament/french-bread-rumble-100/event/rivals-2-singles"
expected_kind = "elimination"
setup_type = ["switch", "pokemon"]

[[brackets]]
slug = "tournament/french-bread-rumble-100/event/mugen-singles"
expected_kind = "elimination"
setup_type = ["switch", "pokemon"]

[[brackets]]
slug = "tournament/french-bread-rumble-100/event/special-smash"
expected_kind = "elimination"
setup_type = ["switch", "pokemon"]

[[brackets]]
slug = "tournament/french-bread-rumble-100/event/pokemon-champions-4v4-double-battle"
expected_kind = "swiss"
duration_prior_secs = 600
setup_type = "pokemon"
